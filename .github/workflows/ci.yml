name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PREVIEW_VERSION_SUFFIX: alpha.${{ github.run_number }}

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            src/**/*.csproj

      - name: Restore
        run: dotnet restore ./system-commandline-extensions.slnx

      - name: Build
        run: dotnet build ./system-commandline-extensions.slnx --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts/test-results/${{ matrix.os }} | Out-Null
          dotnet test ./system-commandline-extensions.slnx --configuration Release --no-build --logger:"trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results/${{ matrix.os }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./artifacts/test-results/${{ matrix.os }}/**
          if-no-files-found: warn

      - name: Publish test report
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v3
        with:
          name: Tests (${{ matrix.os }})
          path: ./artifacts/test-results/${{ matrix.os }}/*.trx
          reporter: dotnet-trx

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            src/**/*.csproj

      - name: Restore
        run: dotnet restore ./system-commandline-extensions.slnx

      - name: Build
        run: dotnet build ./system-commandline-extensions.slnx --configuration Release --no-restore -p:VersionSuffix=${{ env.PREVIEW_VERSION_SUFFIX }}

      - name: Pack preview package
        run: |
          dotnet pack ./src/HelpLine.HelpBuilder/HelpLine.HelpBuilder.csproj --configuration Release --no-build --output ./artifacts -p:VersionSuffix=${{ env.PREVIEW_VERSION_SUFFIX }}
          dotnet pack ./src/HelpLine.Docs/HelpLine.Docs.csproj --configuration Release --no-build --output ./artifacts -p:VersionSuffix=${{ env.PREVIEW_VERSION_SUFFIX }}

      - name: Publish preview package to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "./artifacts/*.nupkg" --source github --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ env.PREVIEW_VERSION_SUFFIX }}
          path: ./artifacts/*
